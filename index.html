<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Steen Papier Schaar - Gilde Editie</title>
    <link rel="stylesheet" href="spel.css">
</head>
<body>

    <div class="game-container">
        
        <h1>Ronde: <span id="round-count">1</span></h1>
        
        <div class="scoreboard">
            <p>Jij: <span id="user-score">0</span></p>
            <p>Streak: <span id="streak">0</span></p>
            <p>Computer: <span id="computer-score">0</span></p>
        </div>

        <div class="display-area">
            <h2 id="status">Maak je keuze...</h2>
            
            <div id="countdown"></div>

            <div class="choices">
                <p>Jij: <span id="human">?</span></p>
                <p>Computer: <span id="computer">?</span></p>
            </div>

            <h2 id="result"></h2>
        </div>

        <div class="button-container">
            <div class="choice-btn" id="steen">
                <img src="https://img.icons8.com/color/96/rock.png" alt="Steen">
            </div>
            
            <div class="choice-btn" id="papier">
                <img src="https://img.icons8.com/color/96/paper.png" alt="Papier">
            </div>
            
            <div class="choice-btn" id="schaar">
                <img src="https://img.icons8.com/color/96/scissors.png" alt="Schaar">
            </div>
        </div>

        <button id="reset-btn">Reset Spel</button>
    </div>

    <audio id="win-sound" src="https://www.myinstants.com/media/sounds/win.mp3"></audio>
    <audio id="click-sound" src="https://www.myinstants.com/media/sounds/click.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
